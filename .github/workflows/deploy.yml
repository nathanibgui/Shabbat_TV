name: Build & Deploy ShabbatTV

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/shabbattv

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Deploy to /opt/shabbattv (same location as other apps)
            mkdir -p /opt/shabbattv

            # Pull latest image
            docker pull ghcr.io/nathanibgui/shabbattv:latest

            # Stop and remove old container
            docker rm -f shabbattv-web 2>/dev/null || true

            # Run with correct healthcheck and labels
            docker run -d --name shabbattv-web --restart unless-stopped \
              --network n8n_default \
              -v shabbattv-data:/app/data \
              -v shabbattv-logs:/app/logs \
              --health-cmd="python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1/')\"" \
              --health-interval=30s \
              --health-timeout=3s \
              --health-retries=3 \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.shabbattv.rule=Host(\`shabbat.nathanibgui.com\`)" \
              --label "traefik.http.routers.shabbattv.entrypoints=websecure" \
              --label "traefik.http.routers.shabbattv.tls.certresolver=mytlschallenge" \
              --label "traefik.http.services.shabbattv.loadbalancer.server.port=80" \
              ghcr.io/nathanibgui/shabbattv:latest

            # Wait and verify
            sleep 15
            docker ps | grep shabbattv
            echo "Deployed: https://shabbat.nathanibgui.com"
