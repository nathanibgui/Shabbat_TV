name: Build & Deploy ShabbatTV

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/shabbattv

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Fail on any error (avant : un pull rate relançait la vieille image)
            set -e

            # Deploy to /opt/shabbattv (same location as other apps)
            mkdir -p /opt/shabbattv

            # Login GHCR avec le token du run (le paquet est prive)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin

            # Ensure PostgreSQL is running
            if ! docker ps | grep -q shabbattv-db; then
              docker run -d --name shabbattv-db --restart unless-stopped \
                --network n8n_default \
                -v shabbattv-pgdata:/var/lib/postgresql/data \
                -e POSTGRES_DB=shabbattv \
                -e POSTGRES_USER=shabbattv \
                -e POSTGRES_PASSWORD=shabbattv_secure_2026 \
                postgres:16-alpine
              sleep 10
            fi

            # Pull latest image
            docker pull ghcr.io/nathanibgui/shabbattv:latest
            docker logout ghcr.io

            # Stop and remove old container
            docker rm -f shabbattv-web 2>/dev/null || true

            # Run with correct healthcheck and labels
            docker run -d --name shabbattv-web --restart unless-stopped \
              --network n8n_default \
              -v shabbattv-data:/app/data \
              -v shabbattv-logs:/app/logs \
              -e DATABASE_URL="postgresql://shabbattv:shabbattv_secure_2026@shabbattv-db:5432/shabbattv" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e GOOGLE_CLIENT_ID="752558880706-4fh0m4j075f7qjt0d1kqca1c0njr5ndm.apps.googleusercontent.com" \
              --health-cmd="python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1/')\"" \
              --health-interval=30s \
              --health-timeout=3s \
              --health-retries=3 \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.shabbattv.rule=Host(\`shabbat.nathanibgui.com\`)" \
              --label "traefik.http.routers.shabbattv.entrypoints=websecure" \
              --label "traefik.http.routers.shabbattv.tls.certresolver=mytlschallenge" \
              --label "traefik.http.services.shabbattv.loadbalancer.server.port=80" \
              ghcr.io/nathanibgui/shabbattv:latest

            # Wait and verify
            sleep 15
            docker ps | grep shabbattv
            echo "Deployed: https://shabbat.nathanibgui.com"
