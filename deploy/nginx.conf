server {
    listen 80;
    server_name shabbat.nathanibgui.com;
    root /usr/share/nginx/html;
    index app.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /app.html;
    }

    # Cache static assets
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
