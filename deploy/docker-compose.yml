# ============================================================
# ShabbatTV Web — Deploiement VPS avec Traefik existant
# Se branche sur le Traefik de /docker/n8n/
# ============================================================

services:
  shabbattv:
    image: nginx:alpine
    container_name: shabbattv-web
    restart: unless-stopped
    volumes:
      - ./www:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.shabbattv.rule=Host(`shabbat.nathanibgui.com`)
      - traefik.http.routers.shabbattv.tls=true
      - traefik.http.routers.shabbattv.entrypoints=web,websecure
      - traefik.http.routers.shabbattv.tls.certresolver=mytlschallenge
      - traefik.http.services.shabbattv.loadbalancer.server.port=80
      - traefik.http.middlewares.shabbattv-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.shabbattv-headers.headers.STSSeconds=315360000
      - traefik.http.middlewares.shabbattv-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.shabbattv-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.shabbattv-headers.headers.forceSTSHeader=true
      - traefik.http.middlewares.shabbattv-headers.headers.STSIncludeSubdomains=true
      - traefik.http.routers.shabbattv.middlewares=shabbattv-headers@docker
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true
